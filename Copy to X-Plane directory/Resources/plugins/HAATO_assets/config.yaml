      - {id: 1, latitude: 47.77272488,  longitude: -121.22460522,  altitude: 1306.3, type: severe,   image_path: fire_severe_1.jpg,   image_res: [1024, 1024]}
      - {id: 2, latitude: 47.9034666,   longitude: -121.03370867,  altitude: 1349.5, type: moderate, image_path: fire_moderate_2.jpg, image_res: [507,  379]}
      - {id: 3, latitude: 47.74758391,  longitude: -120.92196901,  altitude: 1750.0, type: severe,   image_path: fire_severe_2.jpg,   image_res: [1024, 1024]}
      - {id: 4, latitude: 47.75674735,  longitude: -121.10583619,  altitude: 1617.2, type: moderate, image_path: fire_moderate_3.jpg, image_res: [918,  682]}
      - {id: 5, latitude: 47.70231852,  longitude: -121.23486509,  altitude: 1027.9, type: severe,   image_path: fire_severe_3.jpg,   image_res: [374,  263]}
      - {id: 6, latitude: 47.94601005,  longitude: -121.3080377,   altitude: 1306.8, type: moderate, image_path: fire_moderate_4.jpg, image_res: [1000, 666]}
      - {id: 7, latitude: 47.83673111,  longitude: -121.03370867,  altitude: 1500.2, type: moderate, image_path: fire_moderate_1.jpg, image_res: [620,  465]}

    fires_reported:
      - {id: 0, latitude: 47.87597071,  longitude: -121.3080377,   altitude: 1004.8}
      - {id: 1, latitude: 47.77272488,  longitude: -121.22460522,  altitude: 1306.3}

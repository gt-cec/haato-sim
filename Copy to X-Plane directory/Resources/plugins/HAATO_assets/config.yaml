# =============================================================================
# HAATO Simulation Configuration
# Single source of truth for all tunable parameters.
# Replaces fire_targets_mission{1-5}.json and hardcoded values throughout
# the codebase.
# =============================================================================

# ---------------------------------------------------------------------------
# Mission layout data (replaces fire_targets_mission{1-5}.json)
# Each key is the integer fire_layout value used at runtime (1-3 = experiment,
# 4-5 = practice). image_path / image_res are used by the X-Plane plugin only.
# ---------------------------------------------------------------------------
missions:
  # ---------------------------------------------------------------------------
  # Missions 1-3 use the new schema:
  #   fires:           true (physics) positions for the server
  #   fires_reported:  positions shown on MFD at mission start (may differ from true)
  #                    Fires omitted here are UNKNOWN — not shown until discovered
  #   dynamic_events:  fires that spawn mid-mission at trigger_time_s
  #                    Omit reported_latitude/longitude/altitude to spawn as UNKNOWN
  #
  # Missions 4-5 (practice) use the legacy data_points schema for backward compat.
  # ---------------------------------------------------------------------------
  1:
    notes: "Mission 1"
    wind_direction: 150.0
    magnetic_declination: 15.0
    required_altitude_ft_msl: 7000.0
    required_drop_route_length: 2.0
    required_altitude_fire_agl_ft: 1000.0
    human_start_lla: [47.71044513620272, -121.34287916904042, 1600.319856278361]
    human_start_spd: 200
    human_start_hdg: 90
    agent_start_lla: [47.71044513620272, -121.32287916904042, 2333.33333333]
    wingman_active: true

    # True fire positions (server physics / 3-D placement). id is explicit.
    fires:
      - {id: 0, latitude: 47.9748,      longitude: -121.258566,    altitude: 1500.2, type: moderate, image_path: fire_moderate_1.jpg, image_res: [620,  465]}
      - {id: 1, latitude: 47.76563325,  longitude: -121.318566,    altitude:  400.2, type: severe,   image_path: fire_severe_1.jpg,   image_res: [1024, 1024]}
      - {id: 2, latitude: 47.8364665,   longitude: -121.318566,    altitude:  800.7, type: moderate, image_path: fire_moderate_2.jpg, image_res: [507,  379]}
      - {id: 3, latitude: 47.8964665,   longitude: -121.21332825,  altitude: 1000.0, type: severe,   image_path: fire_severe_2.jpg,   image_res: [1024, 1024]}
      - {id: 4, latitude: 47.75563325,  longitude: -121.21332825,  altitude: 1300.9, type: moderate, image_path: fire_moderate_3.jpg, image_res: [918,  682]}
      - {id: 5, latitude: 47.76223325,  longitude: -121.1080905,   altitude: 1500.2, type: severe,   image_path: fire_severe_3.jpg,   image_res: [374,  263]}
      - {id: 6, latitude: 47.90729975,  longitude: -121.00285275,  altitude: 1300.8, type: moderate, image_path: fire_moderate_4.jpg, image_res: [1000, 666]}
      - {id: 7, latitude: 47.962133,    longitude: -120.980285275, altitude: 1800.8, type: moderate, image_path: fire_moderate_1.jpg, image_res: [620,  465]}

    # Reported positions shown on MFD at mission start.
    # All fires are known with perfect information in this baseline config.
    # Adjust positions or omit entries to introduce imperfect information.
    fires_reported:
      - {id: 0, latitude: 47.9748,      longitude: -121.258566,    altitude: 1500.2}
      - {id: 1, latitude: 47.76563325,  longitude: -121.318566,    altitude:  400.2}
      - {id: 2, latitude: 47.8364665,   longitude: -121.318566,    altitude:  800.7}
      - {id: 3, latitude: 47.8964665,   longitude: -121.21332825,  altitude: 1000.0}
      - {id: 4, latitude: 47.75563325,  longitude: -121.21332825,  altitude: 1300.9}
      - {id: 5, latitude: 47.76223325,  longitude: -121.1080905,   altitude: 1500.2}
      - {id: 6, latitude: 47.90729975,  longitude: -121.00285275,  altitude: 1300.8}
      - {id: 7, latitude: 47.962133,    longitude: -120.980285275, altitude: 1800.8}

    # Dynamic fire events (fires that spawn mid-mission).
    # Empty by default — add entries to enable dynamic spawning.
    dynamic_events: []


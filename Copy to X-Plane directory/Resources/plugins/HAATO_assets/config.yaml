    fires:
      - {id: 0, latitude: 47.80205128,  longitude: -121.08618394,  altitude: 1445.6, type: moderate, image_path: fire_moderate_1.jpg, image_res: [620,  465]}
      - {id: 1, latitude: 47.82205128,  longitude: -121.25505337,  altitude:  950.2, type: severe,   image_path: fire_severe_1.jpg,   image_res: [1024, 1024]}
      - {id: 2, latitude: 47.89442845,  longitude: -121.29927618,  altitude:  849.7, type: moderate, image_path: fire_moderate_2.jpg, image_res: [507,  379]}
      - {id: 3, latitude: 47.7593711,   longitude: -121.19674785,  altitude: 1464.4, type: severe,   image_path: fire_severe_2.jpg,   image_res: [1024, 1024]}
      - {id: 4, latitude: 47.87491038,  longitude: -121.16498953,  altitude: 1390.9, type: moderate, image_path: fire_moderate_3.jpg, image_res: [918,  682]}
      - {id: 5, latitude: 47.75044363,  longitude: -121.08618394,  altitude: 1250.2, type: severe,   image_path: fire_severe_3.jpg,   image_res: [374,  263]}
      - {id: 6, latitude: 47.75969688,  longitude: -121.30505337,  altitude:  555.8, type: moderate, image_path: fire_moderate_4.jpg, image_res: [1000, 666]}
      - {id: 7, latitude: 47.94310387,  longitude: -121.18610203,  altitude: 1248.8, type: moderate, image_path: fire_moderate_1.jpg, image_res: [620,  465]}

    fires_reported:
      - {id: 0, latitude: 47.80205128,  longitude: -121.08618394,  altitude: 1445.6}
      - {id: 1, latitude: 47.82205128,  longitude: -121.25505337,  altitude:  950.2}

# ---------------------------------------------------------------------------
# Parameters shared across all missions
# ---------------------------------------------------------------------------
mission_parameters:
  max_mission_time_s: 1800              # 30-minute mission
  visual_detection_range_nm: 2.0        # Range at which a fire becomes visually detectable
  wingman_action_frequency: 1           # Recalculate wingman action every N timesteps
  airport_elevation_m: 300              # Airfield elevation MSL in metres
  airfield_lla: [47.71044513620272, -121.34287916904042, 299.319856278361]
  aor_center: [47.836467, -121.108091]  # Centre lat/lon of the area of responsibility
  aor_size_nm: 17                       # Side length of the square AoR in nautical miles

# ---------------------------------------------------------------------------
# Simulated aircraft flight model parameters
# ---------------------------------------------------------------------------
flight_model:
  hdg_tolerance_deg: 5
  spd_tolerance_kts: 5
  alt_tolerance_m: 33
  hdg_rate_deg_per_s: 24
  spd_rate_kts_per_s: 3
  alt_rate_m_per_s: 33
  ai_default_spd_kts: 160
  ai_start_hdg_deg: 150

# ---------------------------------------------------------------------------
# Wingman agent behaviour
# ---------------------------------------------------------------------------
wingman:
  # Scoring weights
  utility_weight: 1.0
  distance_weight: 0.3
  # Late-game behaviour
  late_game_threshold_minutes: 10.0
  proximity_threshold_nm: 5.0
  proximity_bonus: 2.0
  # Lookahead planning
  lookahead_depth: 2
  lookahead_discount: 0.7
  max_planning_time_s: 6.0
  avg_cruise_speed_kts: 120.0
  # Navigation tolerances
  target_lock_distance_nm: 0.1
  overfly_tolerance_nm: 0.3
  route_waypoint_tolerance_nm: 0.5

# ---------------------------------------------------------------------------
# X-Plane plugin parameters
# ---------------------------------------------------------------------------
plugin:
  range_to_classify_nm: 1.0            # Human must be within this range to classify a fire
  range_to_overfly_nm: 0.7             # Human must be within this range during position overfly
  classify_agent_time_limit_s: 15      # Seconds before agent auto-classifies if human does not
  aor_sw: [47.694800, -121.318566]     # Grid south-west corner [lat, lon]
  aor_ne: [47.978133, -120.897615]     # Grid north-east corner [lat, lon]
  g1000_range_steps_nm: [0.5, 1, 1.5, 2, 3, 5, 8, 10, 15, 20, 30, 50, 80, 100, 150]

# ---------------------------------------------------------------------------
# Network / connectivity
# ---------------------------------------------------------------------------
network:
  xplane_ip: "127.0.0.1"
  xplane_port: 49000
  haato_udp_send_port: 48100           # Python side sends on this port (plugin receives)
  haato_udp_recv_port: 48200           # Python side receives on this port (plugin sends)

# ---------------------------------------------------------------------------
# Experiment design (Latin square)
# subject_group is derived as ((subject_id - 1) % 9) + 1;
# subject IDs 99 and 97 use group 99.
# ---------------------------------------------------------------------------
experiment:
  practice_configs:
    - {initiative_level: low,  fire_layout: 4}
    - {initiative_level: high, fire_layout: 5}
  configs:
    99:
      - {initiative_level: high,   fire_layout: 1}
      - {initiative_level: low,    fire_layout: 2}
      - {initiative_level: medium, fire_layout: 3}
    1:
      - {initiative_level: low,    fire_layout: 1}
      - {initiative_level: medium, fire_layout: 2}
      - {initiative_level: high,   fire_layout: 3}
    2:
      - {initiative_level: low,    fire_layout: 2}
      - {initiative_level: medium, fire_layout: 3}
      - {initiative_level: high,   fire_layout: 1}
    3:
      - {initiative_level: low,    fire_layout: 3}
      - {initiative_level: medium, fire_layout: 1}
      - {initiative_level: high,   fire_layout: 2}
    4:
      - {initiative_level: medium, fire_layout: 1}
      - {initiative_level: high,   fire_layout: 2}
      - {initiative_level: low,    fire_layout: 3}
    5:
      - {initiative_level: medium, fire_layout: 2}
      - {initiative_level: high,   fire_layout: 3}
      - {initiative_level: low,    fire_layout: 1}
    6:
      - {initiative_level: medium, fire_layout: 3}
      - {initiative_level: high,   fire_layout: 1}
      - {initiative_level: low,    fire_layout: 2}
    7:
      - {initiative_level: high,   fire_layout: 1}
      - {initiative_level: low,    fire_layout: 2}
      - {initiative_level: medium, fire_layout: 3}
    8:
      - {initiative_level: high,   fire_layout: 2}
      - {initiative_level: low,    fire_layout: 3}
      - {initiative_level: medium, fire_layout: 1}
    9:
      - {initiative_level: high,   fire_layout: 3}
      - {initiative_level: low,    fire_layout: 1}
      - {initiative_level: medium, fire_layout: 2}
  initiative_level_map:
    low: 0.0
    medium: 1.0
    high: 2.0

# ---------------------------------------------------------------------------
# System / simulation loop
# ---------------------------------------------------------------------------
system:
  target_fps: 30
  crash_save_interval_steps: 10
  default_log_hz: 1.0
